{% extends "base.html" %}
{% block head_extra %}
<script>
const ENCRYPT_KEY = "{{ encrypt_key_b64 }}";

function xorEncrypt(plaintext, keyB64) {
    const key = Uint8Array.from(atob(keyB64), c => c.charCodeAt(0));
    const data = new TextEncoder().encode(plaintext);
    const encrypted = new Uint8Array(data.length);
    for (let i = 0; i < data.length; i++) {
        encrypted[i] = data[i] ^ key[i % key.length];
    }
    let binary = '';
    encrypted.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
}

function encryptPassword() {
    const pwdField = document.getElementById('password');
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '加密中...';
    pwdField.value = xorEncrypt(pwdField.value, ENCRYPT_KEY);
    return true;
}
</script>
{% endblock %}
{% block content %}
<div class="card login-card">
    <h2>用户登录</h2>
    <form method="POST" action="/login" onsubmit="return encryptPassword()">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        <button type="submit" class="btn btn-primary" id="loginBtn">登 录</button>
    </form>
</div>
{% endblock %}
